spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurementdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.endpoint.metrics.enabled=true

logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO

app.security.jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3JldEtleUZvclF1YW50aXR5TWVhc3VyZW1lbnRBcHBBcGlKV1QxMjM0NTY3OA==}
app.security.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
app.security.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI:}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
