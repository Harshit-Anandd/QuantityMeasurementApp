spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:quantitymeasurementdb}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.endpoint.metrics.enabled=true

logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.security=INFO

app.security.jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3JldEtleUZvclF1YW50aXR5TWVhc3VyZW1lbnRBcHBBcGlKV1QxMjM0NTY3OA==}
app.security.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
app.security.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI:https://your-vercel-app.vercel.app/oauth2/callback}
app.security.oauth2.failure-redirect-uri=${OAUTH2_FAILURE_REDIRECT_URI:https://your-vercel-app.vercel.app/login}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://your-vercel-app.vercel.app}

